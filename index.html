<!DOCTYPE html>
<html>

<head>
  <base href="/abc_ots_web_app_truong/">
  <!-- <base href="https://cnvt1803.github.io/abc_ots_web_app_truong/"> -->
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ABC">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ABC OTS">

  <link rel="apple-touch-icon" href="icons/192.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <title>ABC OTS</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = "3129392575";
  </script>
  <script src="flutter.js" defer=""></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.7.570/pdf.min.js"></script>
  <script type="text/javascript">
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.7.570/pdf.worker.min.js";
  </script>

  <style id="splash-screen-style">
    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #ffffff;
      background-size: 100% 100%;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #111827;
      }
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      width: 280px;
      height: auto;
      object-fit: contain;
      animation: pulse-logo 2.5s ease-in-out infinite;
    }

    @keyframes pulse-logo {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.9;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.08);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.9;
      }
    }

    .contain {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .stretch {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cover {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>

  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      var splash = document.getElementById("splash");
      if (splash) {
        splash.remove();
      }
      var branding = document.getElementById("splash-branding");
      if (branding) {
        branding.remove();
      }
      document.body.style.background = "transparent";
    }
  </script>
</head>

<body>
  <picture id="splash">
    <img class="center" src="icons/logo.svg" alt="Loading...">
  </picture>

  <script>
    window.addEventListener('load', function (ev) {
      // Cơ chế bảo vệ: Tự động xóa splash sau 4 giây phòng trường hợp script bị trễ
      var timeoutFallback = setTimeout(function () {
        removeSplashFromWeb();
      }, 4000);

      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp().then(function () {
              clearTimeout(timeoutFallback);
              setTimeout(removeSplashFromWeb, 100);
            });
          });
        }
      });
    });
  </script>
</body>

</html>
